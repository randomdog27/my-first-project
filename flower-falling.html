<script>
const flowers = ['🌸', '🌼', '🌺', '🥀', '🌷', '🌻'];

function createFlower() {
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];

    let x = Math.random() * window.innerWidth;
    let y = -50;

    // vật lý tự nhiên hơn
    let velocityY = 0; 
    const gravity = 0.05 + Math.random() * 0.05;

    const swayAmplitude = 20 + Math.random() * 30; // độ lắc ngang
    const swaySpeed = 0.001 + Math.random() * 0.002;

    let rotation = Math.random() * 360;
    const rotationSpeed = (Math.random() - 0.5) * 0.3;

    flower.style.left = x + 'px';
    flower.style.top = y + 'px';
    document.body.appendChild(flower);

    function animate(timestamp) {
        velocityY += gravity;
        y += velocityY;

        // lắc ngang mượt theo sóng sin
        x += Math.sin(timestamp * swaySpeed) * 0.5;

        // gió nhẹ, thay đổi chậm
        const wind = Math.sin(timestamp * 0.0005) * 0.3;
        x += wind;

        rotation += rotationSpeed;

        flower.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;

        if (y < window.innerHeight + 50) {
            requestAnimationFrame(animate);
        } else {
            flower.remove();
        }
    }

    requestAnimationFrame(animate);
}

// tạo hoa liên tục nhưng nhẹ hơn
setInterval(createFlower, 600);

// tạo ban đầu
for (let i = 0; i < 5; i++) {
    setTimeout(createFlower, i * 300);
}
</script>
