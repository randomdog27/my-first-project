<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Falling Flowers</title>\n    <style>\n        body {\n            height: 100vh;\n            overflow: hidden;\n            background-color: #f3f4f6;\n            position: relative;\n        }\n\n        .flower {\n            position: absolute;\n            top: -50px;\n            opacity: 0.8;\n        }\n\n        @keyframes fall {\n            to {\n                transform: translateY(100vh);\n            }\n        }\n    </style>\n</head>\n<body>\n    <script>\n        const NUM_FLOWERS = 20;\n        const flowers = ['🌸', '🌼', '🌺', '🥀'];\n\n        function createFlower() {\n            const flowerElement = document.createElement('div');\n            flowerElement.innerText = flowers[Math.floor(Math.random() * flowers.length)];\n            flowerElement.classList.add('flower');\n            flowerElement.style.left = Math.random() * 100 + 'vw';\n            flowerElement.style.fontSize = Math.random() * 30 + 20 + 'px';\n            flowerElement.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;\n            document.body.appendChild(flowerElement);\n\n            setTimeout(() => {\n                flowerElement.remove();\n            }, 5000);\n        }\n\n        for (let i = 0; i < NUM_FLOWERS; i++) {\n            createFlower();\n        }\n        setInterval(createFlower, 2000);\n    </script>\n</body>\n</html>
