<script>
const flowers = ['🌸', '🌼', '🌺', '🌷'];

function createFlower() {
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];

    const startX = Math.random() * window.innerWidth;
    let y = -50;

    let velocityY = 0;
    const gravity = 0.02 + Math.random() * 0.015; // rơi rất nhẹ

    const swayAmplitude = 15 + Math.random() * 20; // độ lắc ngang nhỏ
    const swaySpeed = 0.0008 + Math.random() * 0.0008; // rất chậm

    let rotation = Math.random() * 360;
    const rotationSpeed = (Math.random() - 0.5) * 0.1; // xoay rất nhẹ

    document.body.appendChild(flower);

    function animate(timestamp) {

        // rơi xuống mềm mại
        velocityY += gravity;
        y += velocityY;

        // dao động quanh vị trí gốc (không cộng dồn)
        const swayX = Math.sin(timestamp * swaySpeed) * swayAmplitude;

        // gió nhẹ rất chậm
        const wind = Math.sin(timestamp * 0.0003) * 10;

        rotation += rotationSpeed;

        flower.style.transform =
            `translate(${startX + swayX + wind}px, ${y}px) rotate(${rotation}deg)`;

        if (y < window.innerHeight + 50) {
            requestAnimationFrame(animate);
        } else {
            flower.remove();
        }
    }

    requestAnimationFrame(animate);
}

// tạo thưa hơn cho cảm giác mùa xuân nhẹ
setInterval(createFlower, 900);

for (let i = 0; i < 4; i++) {
    setTimeout(createFlower, i * 400);
}
</script>
