<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Flowers Animation</title>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            background-color: #87CEEB;
        }
        .flower {
            position: absolute;
            opacity: 0;
            transition: opacity 2s, transform 2s;
        }
    </style>
</head>
<body>
    <script>
        function createFlower() {
            const flower = document.createElement('img');
            flower.src = 'https://example.com/flower.png'; // Placeholder for flower image
            flower.classList.add('flower');
            document.body.appendChild(flower);

            const x = Math.random() * window.innerWidth;
            flower.style.left = x + 'px';
            flower.style.transform = `translateY(-100px) rotate(${Math.random() * 360}deg)`;
            flower.style.opacity = 1;

            const fallDuration = Math.random() * 3 + 5;
            const sway = Math.sin(Date.now() / 1000 + x) * 20;

            setTimeout(() => {
                flower.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 360}deg) translateX(${sway}px)`;
                flower.style.opacity = 0;
                setTimeout(() => flower.remove(), 2000);
            }, 50);

            setTimeout(createFlower, 500);
        }

        createFlower();
    </script>
</body>
</html>
