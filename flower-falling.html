<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Flowers with Wind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
        }
        
        .flower {
            position: fixed;
            font-size: 2.5rem;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <script>
        const flowers = ['🌸', '🌼', '🌺', '🥀', '🌷', '🌻'];
        
        function createFlower() {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
            
            const startX = Math.random() * window.innerWidth;
            const startY = -50;
            
            flower.style.left = startX + 'px';
            flower.style.top = startY + 'px';
            flower.style.opacity = '1';
            flower.style.transition = 'none';
            
            document.body.appendChild(flower);
            
            let y = startY;
            let x = startX;
            let rotation = 0;
            let windForce = Math.sin(Date.now() / 500) * 50;
            let sway = Math.random() * 2 - 1;
            
            const fall = setInterval(() => {
                y += Math.random() * 3 + 1;
                x += sway + windForce * 0.01;
                rotation += Math.random() * 10 - 5;
                
                // Wind effect
                windForce = Math.sin(Date.now() / 800) * 30;
                
                // Boundary check
                if (x < 0) x = window.innerWidth;
                if (x > window.innerWidth) x = 0;
                
                flower.style.left = x + 'px';
                flower.style.top = y + 'px';
                flower.style.transform = `rotate(${rotation}deg) scale(${0.8 + Math.sin(rotation / 180 * Math.PI) * 0.2})`;
                
                if (y > window.innerHeight) {
                    clearInterval(fall);
                    flower.style.opacity = '0';
                    flower.style.transition = 'opacity 0.5s ease-out';
                    setTimeout(() => flower.remove(), 500);
                }
            }, 30);
        }
        
        // Create flowers continuously
        setInterval(createFlower, 400);
        
        // Create initial flowers
        for (let i = 0; i < 5; i++) {
            setTimeout(createFlower, i * 200);
        }
    </script>
</body>
</html>
